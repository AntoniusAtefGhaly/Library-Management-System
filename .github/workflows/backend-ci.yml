name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'Library-Management-System-BE/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'Library-Management-System-BE/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Library-Management-System-BE

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore LMS.sln
      
    - name: Build
      run: dotnet build LMS.sln --configuration Release --no-restore
      
    - name: Test
      run: dotnet test LMS.sln --configuration Release --no-build --verbosity normal
