<div class="login-container">
  <div class="login-card glass">
    <div class="login-header">
      <div class="logo-box">
        <i class="fas fa-book-reader"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your library account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="name@example.com"
            [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          >
        </div>
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-text">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          >
        </div>
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
          Password is required.
        </div>
      </div>

      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-primary">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="loader"></span>
      </button>

      <div class="login-footer">
        Don't have an account? <a routerLink="/register">Register now</a>
      </div>
    </form>
  </div>
</div>
